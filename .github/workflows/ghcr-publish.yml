name: Publish Docker Images to GHCR

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - frontend/**
      - .github/workflows/ghcr-publish.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build and push ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            image: k8s_test_app-backend
          - service: frontend
            image: k8s_test_app-frontend

    outputs:
      backend_sha: ${{ steps.meta_backend.outputs.digest }}
      frontend_sha: ${{ steps.meta_frontend.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (backend)
        if: matrix.service == 'backend'
        id: meta_backend
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/k8s_test_app-backend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
            type=ref,event=branch

      - name: Extract Docker metadata (frontend)
        if: matrix.service == 'frontend'
        id: meta_frontend
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/k8s_test_app-frontend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
            type=ref,event=branch

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta_backend.outputs.tags || steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels || steps.meta_frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-gitops:
    name: Update GitOps manifests
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write

    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v6
        with:
          repository: mickeyreg/k8s_test_app-deploy
          token: ${{ secrets.PAT_k8s_test_app_GITOPS }}
          path: gitops

      - name: Install yq
        run: |
          wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Update backend image SHA
        run: |
          yq -i '.spec.template.spec.containers[0].image = "ghcr.io/${{ github.repository_owner }}/k8s_test_app-backend@${{ needs.publish.outputs.backend_sha }}"' gitops/manifest/backend-deployment.yaml

      - name: Update frontend image SHA
        run: |
          yq -i '.spec.template.spec.containers[0].image = "ghcr.io/${{ github.repository_owner }}/k8s_test_app-frontend@${{ needs.publish.outputs.frontend_sha }}"' gitops/manifest/frontend-deployment.yaml

      - name: Commit and push changes
        run: |
          git config user.email "ci@github"
          git config user.name "GitHub Actions"
          git add .
          git commit -m "Update images to new SHAs"
          git push
